org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
android.useAndroidX=true
kotlin.code.style=official
android.nonTransitiveRClass=true

# ============================================================
# App version management (Semantic Versioning)
# major.minor.patch
#   major: breaking changes or large structural overhaul
#   minor: new feature added
#   patch: bug fix
# ============================================================
VERSION_MAJOR=1
VERSION_MINOR=4
VERSION_PATCH=2